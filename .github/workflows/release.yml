name: build-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    strategy:
      # Only publish a Release when ALL platforms build successfully.
      fail-fast: true
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
          - name: windows-x86_64
            os: windows-latest
          - name: macos-x86_64
            os: macos-15-intel
          - name: macos-aarch64
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libudev-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxi-dev \
            libxrandr-dev \
            libxkbcommon-dev \
            libwayland-dev \
            wayland-protocols \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            clang \
            cmake

      - name: Build (release)
        run: cargo build --release --locked

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hostTriple = (rustc -vV | Select-String '^host:' | ForEach-Object { $_.Line.Split(':')[1].Trim() })
          $out = "process_monitor-$($env:RUNNER_OS)-$hostTriple.exe"
          Copy-Item "target/release/process_monitor.exe" $out
          echo "ASSET_NAME=$out" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          hostTriple=$(rustc -vV | sed -n 's/^host: //p')
          out="process_monitor-${RUNNER_OS}-${hostTriple}"
          cp target/release/process_monitor "$out"
          chmod +x "$out"
          echo "ASSET_NAME=$out" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
